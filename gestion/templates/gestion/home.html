
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion Transport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">🚍 Application de réservation de transport</h1>



    <div class="row">

        <a href="/admin" style="text-decoration: none; background-color: #264b5d; color: white; padding: 10px; border-radius: 5px;">Aller à l'administration</a>
        <div class="col-md-6">
            <div class="card shadow p-3 mb-4">
                <h3>Lignes</h3>
                <ul>
                    {% for ligne in Lignes %}
                        <li>
                            {{ ligne }}
                            <button class="btn btn-success btn-sm ms-2">Réserver</button>
                        </li>
                    {% empty %}
                        <li>Aucune ligne</li>
                    {% endfor %}
                </ul>
            </div>
        </div>

        <!-- Horaires -->
        <div class="col-md-6">
            <div class="card shadow p-3 mb-4">
                <h3>Horaires</h3>
                <ul>
                    {% for horaire in Horaires %}
                        <li>{{ horaire }}</li>
                    {% empty %}
                        <li>Aucun horaire</li>
                    {% endfor %}
                </ul>
            </div>
        </div>

    </div>
</div>

</body>
</html>
